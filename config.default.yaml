addr: "0.0.0.0:8080"
spiDevice: "/dev/spidev0.0"

dvr:
  recordingsDir: "recordings"
  segmentDuration: 600
  thumbnailHeight: 240
  ffmpegLog: false
  record: true
  minFreeDisk: 0
  diskSpacePoll: "1m"
  cameras: []

i2cDevice: "/dev/i2c-1"
pingInterval: "1s"

airSensor:
  address: 0x77
  interval: "1s"

expander:
  address: 0x20
  interval: "2ms"
  bits:
    joyCenter: 8
    joyDown: 9
    joyKnob: 13
    joyLeft: 12
    joyRight: 11
    joyUp: 10
    knobCenter: 0
    knobInner: 1
    knobOuter: 3
    led: 6

lightSensor:
  address: 0x48
  interval: "1s"

oled:
  driver: "ssd1327"
  statusPin: 5
  flip: true
  gpioChip: "gpiochip0"
  resetPin: 6
  spiSpeed: "2.40MHz"

screen:
  fps: 30
  splashDuration: "2s"
  splashImage: "ui/public/img/logo.png"

tires:
  nose:
  left:
  right:

music:
  acoustidKey: ""
  acoustidMinScore: 0.8
  backupDir: "backup"
  albumRequiredPercent: 50
  audioDevice: "auto"
  maxBitrate: 0
  minDbVersion: 1
  musicDir: "music"
  playedRequiredPercent: 50
  transcodeFormat: aac
  volume: 100

ui:
  tail: "N711ME"
  headerColor: "#3b82f6"
  adminHeaderColor: "#dc2626"
  panel:
    width: 256
    height: 64
    controlBackground: "#000000"
    controlBorder: "#444444"
    controlText: "#ffffff"
    selectedBackground: "#222222"
    selectedBorder: "#888888"
    selectedText: "#ffffff"
    activeBackground: "#ffffff"
    activeBorder: "#888888"
    activeText: "#000000"
    homeTimezone: "America/Phoenix"
    timeFormat: "hh:mm:ssa"
  navMenu:
    hideDelay: 2000
    cellWidth: 64
    longPressMs: 1000
  keyMap:
    up: ArrowUp
    down: ArrowDown
    left: ArrowLeft
    right: ArrowRight
    enter: Enter
    joyLeft: ","
    joyRight: .
    innerLeft: ;
    innerRight: "'"
    outerLeft: "["
    outerRight: "]"
