addr: "0.0.0.0:8080"
spiDevice: "/dev/spidev0.0"

storage:
  dvr: "data/recordings"
  music: "data/music"
  backup: "data/backup"
  snaps: "data/snaps"

dvr:
  segmentDuration: 600
  thumbnailHeight: 240
  ffmpegLog: false
  record: true
  minFreeDisk: 0
  diskSpacePoll: "1m"
  cameras: []

i2cDevice: "/dev/i2c-1"
pingInterval: "1s"

airSensor:
  address: 0x77
  interval: "1s"

expander:
  address: 0x27
  interval: "2ms"
  bits:
    knobInnerA: 0
    knobOuterA: 1
    knobInnerB: 2
    knobOuterB: 3
    knobCenter: 4
    ledR: 5
    ledW: 6
    ledB: 7
    ledY: 8
    joyCenter: 9
    joyUp: 10
    joyLeft: 11
    joyDown: 12
    joyRight: 13
    joyKnobA: 14
    joyKnobB: 15

lightSensor:
  address: 0x10
  interval: "1s"

oled:
  driver: "ssd1327"
  statusPin: 4
  flip: false
  gpioChip: "gpiochip0"
  spiSpeed: "2.40MHz"

resetPin: 5

screen:
  fps: 30
  splashDuration: "2s"
  splashImage: "ui/public/img/logo.png"

airCon:
  deviceName: "AirCon"
  serviceUUID: "aaaaaaaa-1111-cccc-00dd-000000000000"
  historyMinutes: 30

tires:
  nose:
  left:
  right:

g3x:
  device: "/dev/ttyAMA0"

thermal:
  device: "/dev/ttyAMA4"

music:
  acoustidKey: ""
  acoustidMinScore: 0.8
  albumRequiredPercent: 50
  audioDevice: "auto"
  maxBitrate: 0
  minDbVersion: 1
  playedRequiredPercent: 50
  transcodeFormat: aac
  volume: 100

ui:
  tail: "N12345"
  headerColor: "#3b82f6"
  adminHeaderColor: "#dc2626"
  panel:
    width: 256
    height: 64
    controlBackground: "#000000"
    controlBorder: "#444444"
    controlText: "#ffffff"
    selectedBackground: "#222222"
    selectedBorder: "#888888"
    selectedText: "#ffffff"
    activeBackground: "#ffffff"
    activeBorder: "#888888"
    activeText: "#000000"
    homeTimezone: "America/Phoenix"
    timeFormat: "hh:mm:ssa"
  navMenu:
    hideDelay: 2000
    cellWidth: 64
    longPressMs: 1000
  keyMap:
    up: ArrowUp
    down: ArrowDown
    left: ArrowLeft
    right: ArrowRight
    enter: Enter
    joyLeft: ","
    joyRight: .
    innerLeft: ;
    innerRight: "'"
    outerLeft: "["
    outerRight: "]"
