syntax = "proto3";

message HeatingRodParamSet {
  oneof _run_sta_ctrl {
    string hr_sn = 1;
    uint32 run_sta_ctrl = 2;
  }
  oneof _mode {
    uint32 mode = 3;
  }
  oneof _target_temp {
    uint32 target_temp = 4;
  }
  oneof _target_power {
    uint32 target_power = 5;
  }
  oneof _water_tank_volume {
    uint32 water_tank_volume = 6;
  }
  oneof _dry_heat_ignore {
    uint32 dry_heat_ignore = 7;
  }
}

message HeatingRodParamSetAck {
  optional string hr_sn = 1;
  optional int32 result = 2;
}

message HRChargingParamReport {
  oneof _hr_sn {
    string hr_sn = 1;
  }
  oneof _mode {
    uint32 mode = 2;
  }
  oneof _online_bits {
    uint32 online_bits = 3;
  }
  oneof _heating_power {
    uint32 heating_power = 4;
  }
  oneof _target_power {
    uint32 target_power = 5;
  }
  oneof _temp {
    float temp = 6;
  }
  oneof _target_temp {
    float target_temp = 7;
  }
  oneof _run_stat {
    uint32 run_stat = 8;
  }
  oneof _error_code {
    uint32 error_code = 9;
  }
  oneof _water_tank_volume {
    uint32 water_tank_volume = 10;
  }
  oneof _selfcheck_percent {
    uint32 selfcheck_percent = 11;
  }
  oneof _run_flag {
    uint32 run_flag = 12;
  }
}

message HeatingRodEnergyStreamShow {
  repeated .HeatingRodEnergyStream hr_energy_stream = 1;
}

message HeatingRodEnergyStream {
  optional string hr_sn = 1;
  optional float hr_pwr = 2;
  optional float temp = 3;
  optional float from_pv = 4;
  optional float from_bat = 5;
  optional float from_grid = 6;
}

message HeatingRodEnergyStreamItem {
  optional string hr_sn = 1;
  optional float hr_pwr = 2;
  optional uint32 temp = 3;
  optional fixed32 timestamp = 4;
  optional float from_pv = 5;
  optional float from_bat = 6;
  optional float from_grid = 7;
}

message HeatingRodStreamDetail {
  repeated .HeatingRodEnergyStreamItem hr_energy_stream = 1;
  optional uint32 sys_seq = 2;
}

message HeatingRodStreamDetailAck {
  oneof _sys_energy_num {
    uint32 sys_seq = 1;
    uint32 sys_energy_num = 2;
  }
}

message HeatingRodRunDataGet {
  optional string hr_sn = 1;
}

message HeatingRodRunDataAck {
  oneof _heating_power {
    string hr_sn = 1;
    uint32 heating_power = 2;
  }
  oneof _target_power {
    uint32 target_power = 3;
  }
  oneof _temp {
    uint32 temp = 4;
  }
  oneof _target_temp {
    uint32 target_temp = 5;
  }
  oneof _run_stat {
    uint32 run_stat = 6;
  }
  oneof _error_code {
    uint32 error_code = 7;
  }
  oneof _water_tank_volume {
    uint32 water_tank_volume = 8;
  }
  oneof _target_run_stat {
    uint32 target_run_stat = 9;
  }
  oneof _online {
    bool online = 10;
  }
  oneof _selfcheck_percent {
    uint32 selfcheck_percent = 11;
  }
  oneof _run_flag_bit {
    uint32 run_flag_bit = 12;
  }
}

message HeatingRodCtrl {
  oneof _heating_rod_ctrl {
    string hr_sn = 1;
    uint32 heating_rod_ctrl = 2;
  }
  oneof _heating_rod_power {
    uint32 heating_rod_power = 3;
  }
  oneof _heating_rod_temp {
    uint32 heating_rod_temp = 4;
  }
  oneof _water_tank_volume {
    uint32 water_tank_volume = 5;
  }
  oneof _run_flag_bit {
    uint32 run_flag_bit = 6;
  }
  oneof _dry_heat_ignore {
    uint32 dry_heat_ignore = 7;
  }
}

message HeatingRodCtrlAck {
  optional string hr_sn = 1;
  optional int32 result = 2;
}

message HeatingRodTimerTaskCfgSet {
  optional string hr_sn = 1;
  optional .HeatingRodTimerTaskCfg timer_task = 2;
}

message HeatingRodTimerTaskCfg {
  oneof _is_effect {
    uint32 is_cfg = 1;
    uint32 task_index = 2;
    bool is_enable = 3;
    bool is_effect = 4;
    uint32 time_table = 9;
  }
  oneof _type {
    uint32 type = 5;
  }
  oneof _param {
    int32 param = 6;
  }
  oneof _time_mode {
    uint32 time_mode = 7;
  }
  oneof _time_param {
    uint32 time_param = 8;
  }
}

message HeatingRodTimerTaskCfgAck {
  optional string hr_sn = 1;
  optional uint32 type = 2;
  optional uint32 task_index = 3;
  optional int32 result = 4;
}

message HeatingRodTimerTaskGet {
  optional string hr_sn = 1;
}

message HeatingRodTimerTaskReport {
  optional string hr_sn = 1;
  repeated .HeatingRodTimerTaskCfg time_task_cfg = 2;
}

message HeatingRodRemoteListSync {
}

message HeatingRodRemoteListSyncAck {
  repeated string hr_sn = 1;
}

enum HRCmdSets {
  HR_NONE_CMD_SETS = 0;
  HR_CMD_SETS = 212;
}

enum HRCmdId {
  HR_CMD_ID_NONE = 0;
  HR_CMD_ID_TIMERTASK_REPORT = 2;
  HR_CMD_ID_HRCHARGING_PARAM_REPORT = 8;
  HR_CMD_ID_HRCHARGING_PARAM_SET = 99;
  HR_CMD_ID_HRCHARGING_INIT_SET = 100;
  HR_CMD_ID_TIMER_TASK_SET = 101;
  HR_CMD_ID_TIMER_TASK_GET = 102;
  HR_CMD_ID_HRCHARGING_ENERGY_STREAM_REPORT = 33;
  HR_CMD_ID_ENERGY_STREAM_DETAIL = 34;
  HR_CMD_ID_HRCHARGING_CTRL = 48;
  HR_CMD_ID_HRCHARGING_RUN_DATA_GET = 50;
}

