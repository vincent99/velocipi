message MpptPVInfo {
  optional float vol = 1;
  optional float amp = 2;
  optional float pwr = 3;
  optional bool light_sta = 4;
}

message PhaseInfo {
  optional float vol = 1;
  optional float amp = 2;
  optional float act_pwr = 3;
