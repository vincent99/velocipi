syntax = "proto3";

message SgReadyStatParam {
  oneof _ems_sg_stat {
    bool ems_sg_stat_en = 1;
    uint32 ems_sg_stat = 2;
  }
  oneof _ems_sg_pwr {
    uint32 ems_sg_pwr = 3;
  }
  oneof _ems_sg_soc {
    uint32 ems_sg_soc = 4;
  }
}

message SgReadyParam {
  oneof _ems_sg_mode {
    .SgReadyMode ems_sg_mode = 1;
    .SgReadyStatParam ems_sg_param = 2;
  }
  oneof _ems_sg_rate_pwr {
    uint32 ems_sg_rate_pwr = 3;
  }
  oneof _ems_sg_swit_time {
    uint32 ems_sg_swit_time = 4;
  }
}

message TimeInfo {
  optional uint32 hour = 1;
  optional uint32 min = 2;
  optional uint32 sec = 3;
}

message SelfUsedParam {
}

message TouParam {
  optional .TimeInfo start_time = 1;
  optional .TimeInfo end_time = 2;
  optional uint32 chg_dsg_mode = 3;
}

message BackupParam {
  optional uint32 backup_soc = 1;
}

message PeakShavingDetail {
  optional uint32 peak_shaving_start_time = 1;
  optional uint32 peak_shaving_end_time = 2;
  optional float control_energy_wh = 3;
}

message EmsPeakShavingDetailReport {
  optional float peak_electricity = 1;
  optional .PeakShavingDetail peak_shaving_details = 2;
}

message EnergyStreamItem {
  oneof _peak_shaving_detail {
    float load_pwr = 1;
    float grid_pwr = 2;
    float mppt_pwr = 3;
    float bp_pwr = 4;
    uint32 timestamp = 5;
    sint32 timezone = 6;
    uint32 bp_soc = 7;
    float pv1_pwr = 8;
    float pv2_pwr = 9;
    float pv_inv_pwr = 10;
    float pv3_pwr = 11;
    float other_pv_pwr = 12;
    .EmsPeakShavingDetailReport peak_shaving_detail = 13;
  }
}

message EnergyStreamSwitch {
  optional bool ems_open_energy_stream = 1;
}

message EnergyStreamReport {
  optional float sys_load_pwr = 1;
  optional float sys_grid_pwr = 2;
  optional float mppt_pwr = 3;
  optional float bp_pwr = 4;
  optional uint32 bp_soc = 5;
  optional float pv1_pwr = 6;
  optional float pv2_pwr = 7;
  optional float pv_inv_pwr = 8;
  optional float pv3_pwr = 9;
  optional float other_pv_pwr = 10;
}

message EnergyStreamDetail {
  repeated .EnergyStreamItem sys_energy_stream = 1;
  optional uint32 sys_seq = 2;
}

message EnergyStreamDetailAck {
  oneof _sys_energy_num {
    uint32 sys_seq = 1;
    uint32 sys_energy_num = 2;
  }
}

message SysWorkModeSet {
  oneof _ems_selfused_param {
    .WorkMode ems_word_mode = 1;
    .SelfUsedParam ems_selfused_param = 2;
    .TouParam ems_tou_param = 3;
  }
  oneof _ems_backup_param {
    .BackupParam ems_backup_param = 4;
  }
}

message SysWorkModeSetAck {
  optional sint32 result = 1;
}

message SysBackupEventSet {
  oneof _ems_backup_enable_disenabl {
    uint32 ems_backup_event = 1;
    bool ems_backup_enable_disenabl = 2;
  }
  oneof _ems_backup_start_time {
    uint32 ems_backup_start_time = 3;
  }
  oneof _ems_backup_end_time {
    uint32 ems_backup_end_time = 4;
  }
}

message SysBackupEventSetAck {
  optional sint32 result = 1;
}

message SysKeepSocSet {
  optional uint32 ems_keep_soc = 1;
}

message SysKeepSocSetAck {
  optional sint32 result = 1;
}

message SysFeedPowerSet {
  oneof _ems_feed_mode {
    float ems_max_feed_pwr = 1;
    uint32 ems_feed_mode = 2;
  }
  oneof _ems_feed_ratio {
    uint32 ems_feed_ratio = 3;
  }
  oneof _ems_feed_pwr {
    uint32 ems_feed_pwr = 4;
  }
  oneof _breaker_capacity_max {
    uint32 breaker_capacity_max = 5;
  }
  oneof _sys_switch_bit {
    uint32 sys_switch_bit = 6;
  }
}

message SysFeedPowerSetAck {
  optional sint32 result = 1;
}

message SysMeterRecheck {
  oneof _meter_recheck {
    uint32 meter_recheck = 1;
  }
}

message SysMeterRecheckAck {
  optional sint32 result = 1;
}

message SysOffGridSet {
  optional bool sys_grid_disconnect_mode = 1;
}

message SysOffGridSetAck {
  optional sint32 result = 1;
}

message SysOnOffMachineSet {
  optional bool sys_on_off_machine = 1;
}

message SysOnOffMachineSetAck {
  optional sint32 result = 1;
}

message SysMeterCfgSet {
