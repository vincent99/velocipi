message DevRequest {
  oneof _require_property_upload_period {
    uint32 dev_utc_time = 1;
    float dev_utc_timezone = 2;
    bool require_property_upload_period = 3;
  }
  oneof _require_time_service {
    bool require_time_service = 5;
  }
}

message DevRequestAck {
  oneof _property_upload_period {
    uint32 request_id = 1;
    uint32 require_ok = 2;
    .PropertyUploadPeriod property_upload_period = 3;
  }
}

enum PANEL_GRID_STA {
  PANEL_GRID_STA_NO_VAILD = 0;
