syntax = "proto3";

message EventPush {
  message LogItem {
    optional uint32 unix_time = 1;
    optional uint32 ms = 2;
    optional uint32 event_no = 3;
    repeated float event_detail = 4;
  }

  optional uint32 event_ver = 1;
  optional uint32 event_seq = 2;
  repeated .EventPush.LogItem event_item = 3;
}

message EventAck {
  optional uint32 result = 1;
  optional uint32 event_seq = 2;
  optional uint32 event_item_num = 3;
}

message DevErrcodeList {
  repeated uint32 dev_errcode = 1;
}

message PropertyUploadPeriod {
  optional int32 display_property_full_upload_period = 1;
  optional int32 display_property_incremental_upload_period = 2;
  optional int32 runtime_property_full_upload_period = 3;
  optional int32 runtime_property_incremental_upload_period = 4;
}

message GridConnectionDataRecord {
  optional float today_active_L1 = 1;
  optional float today_active_L2 = 2;
  optional float today_active_L3 = 3;
  optional float today_active = 4;
  optional float today_reactive = 5;
  optional float total_reactive_energy = 6;
  optional float total_active_energy = 7;
}

message ConfigWrite {
  oneof _cfg_power_off {
    bool cfg_power_off = 3;
  }
  oneof _cfg_power_on {
    bool cfg_power_on = 4;
  }
  oneof _reset_factory_setting {
    uint32 reset_factory_setting = 5;
  }
  oneof _cfg_utc_time {
    uint32 cfg_utc_time = 6;
  }
  oneof _cfg_utc_timezone {
    int32 cfg_utc_timezone = 7;
  }
  oneof _cfg_display_property_full_upload_period {
    int32 cfg_display_property_full_upload_period = 67;
  }
  oneof _cfg_display_property_incremental_upload_period {
    int32 cfg_display_property_incremental_upload_period = 68;
  }
  oneof _cfg_runtime_property_full_upload_period {
    int32 cfg_runtime_property_full_upload_period = 69;
  }
  oneof _cfg_runtime_property_incremental_upload_period {
    int32 cfg_runtime_property_incremental_upload_period = 70;
  }
  oneof _active_display_property_full_upload {
    bool active_display_property_full_upload = 71;
  }
  oneof _active_runtime_property_full_upload {
    bool active_runtime_property_full_upload = 72;
  }
  oneof _cfg_utc_timezone_id {
    string cfg_utc_timezone_id = 135;
  }
  oneof _cfg_utc_set_mode {
    bool cfg_utc_set_mode = 136;
  }
  oneof _cfg_country_code {
    string cfg_country_code = 211;
  }
  oneof _cfg_town_code {
    uint32 cfg_town_code = 212;
  }
  oneof _cfg_factory_mode_enable {
    bool cfg_factory_mode_enable = 222;
  }
  oneof _cfg_debug_mode_enable {
    bool cfg_debug_mode_enable = 223;
  }
}

message ConfigWriteAck {
  oneof _cfg_power_off {
    uint32 action_id = 1;
    bool config_ok = 2;
    bool cfg_power_off = 3;
  }
  oneof _cfg_power_on {
    bool cfg_power_on = 4;
  }
  oneof _reset_factory_setting {
    uint32 reset_factory_setting = 5;
  }
  oneof _cfg_utc_time {
    uint32 cfg_utc_time = 6;
  }
  oneof _cfg_utc_timezone {
    int32 cfg_utc_timezone = 7;
  }
  oneof _cfg_display_property_full_upload_period {
    int32 cfg_display_property_full_upload_period = 67;
  }
  oneof _cfg_display_property_incremental_upload_period {
    int32 cfg_display_property_incremental_upload_period = 68;
  }
  oneof _cfg_runtime_property_full_upload_period {
    int32 cfg_runtime_property_full_upload_period = 69;
  }
  oneof _cfg_runtime_property_incremental_upload_period {
    int32 cfg_runtime_property_incremental_upload_period = 70;
  }
  oneof _active_display_property_full_upload {
    bool active_display_property_full_upload = 71;
  }
  oneof _active_runtime_property_full_upload {
    bool active_runtime_property_full_upload = 72;
  }
  oneof _cfg_utc_timezone_id {
    string cfg_utc_timezone_id = 135;
  }
  oneof _cfg_utc_set_mode {
    bool cfg_utc_set_mode = 136;
  }
  oneof _cfg_country_code {
    string cfg_country_code = 211;
  }
  oneof _cfg_town_code {
    uint32 cfg_town_code = 212;
  }
  oneof _cfg_factory_mode_enable {
    bool cfg_factory_mode_enable = 222;
  }
  oneof _cfg_debug_mode_enable {
    bool cfg_debug_mode_enable = 223;
  }
}

message ConfigRead {
  repeated uint32 action_id = 1;
}

message ConfigReadAck {
  oneof _cfg_utc_time {
    uint32 cfg_utc_time = 6;
  }
  oneof _cfg_utc_timezone {
    int32 cfg_utc_timezone = 7;
  }
  oneof _cfg_utc_timezone_id {
    string cfg_utc_timezone_id = 135;
  }
}

