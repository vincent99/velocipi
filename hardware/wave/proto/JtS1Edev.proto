syntax = "proto3";

message EdevBaseInfo {
  oneof _dev_sn {
    uint32 dev_addr = 1;
    string dev_sn = 2;
  }
  oneof _sub_addr {
    uint32 sub_addr = 3;
  }
}

message EDevGet {
  optional uint32 dev_addr = 1;
}

message EDevGetItem {
  optional .EdevBaseInfo dev_info = 1;
}

message EDevGetAck {
  repeated .EDevGetItem dev_list = 1;
  optional uint32 local_connected = 2;
}

message EDevBind {
  oneof _commute_type {
    .EdevBaseInfo dev_info = 1;
    bool bind_flg = 2;
    uint32 commute_type = 3;
  }
}

message EDevBindAck {
  optional .EdevBaseInfo dev_info = 1;
  optional bool bind_flg = 2;
  optional int32 result = 3;
  optional uint32 commute_type = 4;
}

message EDevBindItem {
  oneof _dev_prio {
    .EdevBaseInfo dev_info = 1;
    uint32 commute_type = 2;
    uint32 online_bits = 3;
    uint32 dev_prio = 4;
  }
}

message EDevBindListReport {
  optional uint32 dev_addr = 1;
  repeated .EDevBindItem dev_item = 2;
}

message EDevBindListGet {
  optional .EdevBaseInfo dev_info = 1;
}

message EDevPriorityItem {
  oneof _type {
    .EdevBaseInfo dev_info = 1;
    uint32 dev_prio = 2;
    bool enable = 3;
    uint32 type = 4;
    bytes data = 5;
  }
}

message EDevPriorityListSet {
  repeated .EDevPriorityItem dev_prio_set = 1;
}

message EDevPriorityListSetAck {
  optional int32 result = 1;
}

message EDevPriorityListReport {
  repeated .EDevPriorityItem dev_prio_report = 1;
}

message EDevPriorityListReportGet {
}

message EDevTimerTaskCfg {
  oneof _is_effect {
    uint32 is_cfg = 1;
    uint32 task_index = 2;
    bool is_enable = 3;
    bool is_effect = 4;
    uint32 time_table = 8;
    int32 param = 9;
    uint32 current_table = 11;
  }
  oneof _type {
    uint32 type = 5;
  }
  oneof _time_mode {
    uint32 time_mode = 6;
  }
  oneof _time_param {
    uint32 time_param = 7;
  }
  oneof _task_type {
    uint32 task_type = 10;
  }
  oneof _delay_start {
    bool delay_start = 12;
  }
}

message EDevTimerTaskCfgSet {
  optional .EdevBaseInfo dev_info = 1;
  optional .EDevTimerTaskCfg timer_task = 2;
}

message EDevTimerTaskCfgSetAck {
  optional .EdevBaseInfo dev_info = 1;
  optional uint32 type = 2;
  optional uint32 task_index = 3;
  optional int32 result = 4;
}

message EDevTimerTaskGet {
  optional .EdevBaseInfo dev_info = 1;
}

message EDevTimerTaskReport {
  optional .EdevBaseInfo dev_info = 1;
  repeated .EDevTimerTaskCfg time_task_cfg = 2;
}

message EDevEnergyStreamShowItem {
  optional .EdevBaseInfo dev_info = 1;
  optional float pwr = 2;
  optional float from_pv = 4;
  optional float from_bat = 5;
  optional float from_grid = 6;
}

message EDevEnergyStreamShow {
  repeated .EDevEnergyStreamShowItem energy = 1;
}

message EDevOnOffSet {
  optional .EdevBaseInfo dev_info = 1;
  optional uint32 on_off_set = 2;
}

message EDevOnOffSetAck {
  optional .EdevBaseInfo dev_info = 1;
  optional uint32 result = 2;
}

message EDevRemotCtrlSet {
  optional .EdevBaseInfo dev_info = 1;
  optional bytes data = 2;
}

message EDevRemotCtrlSetAck {
  optional .EdevBaseInfo dev_info = 1;
  optional uint32 result = 2;
}

message EDevMasterToSlaveParamSync {
  optional .EdevBaseInfo dev_info = 1;
  optional bytes data = 2;
}

message EDevModeSet {
  optional .EdevBaseInfo dev_info = 1;
  optional uint32 mode = 2;
}

message EDevModeSetAck {
  optional .EdevBaseInfo dev_info = 1;
  optional uint32 result = 2;
}

message EDevParamSet {
  optional .EdevBaseInfo dev_info = 1;
  optional bytes data = 2;
}

message EDevParamSetAck {
  optional .EdevBaseInfo dev_info = 1;
  optional uint32 result = 2;
}

message EDevParamReport {
  optional .EdevBaseInfo dev_info = 1;
  optional bytes data = 2;
}

enum EcoDevCmdSets {
