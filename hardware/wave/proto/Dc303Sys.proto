syntax = "proto3";

message ErrorCode {
  oneof _module_sn {
    string module_sn = 1;
    uint32 err_code = 2;
    bool error_state = 3;
  }
}

message EnergyItem {
  optional uint32 timestamp = 1;
  optional uint32 watth_type = 2;
  repeated uint32 watth = 3;
}

message EventRecordItem {
  optional uint32 timestamp = 1;
  optional uint32 sys_ms = 2;
  optional uint32 event_no = 3;
  repeated float event_detail = 4;
}

message BPReport {
  oneof _bp_pwr {
    float bp_pwr = 1;
    uint32 err_code = 11;
  }
  oneof _bp_soc {
    float bp_soc = 2;
  }
  oneof _bp_run_sta {
    .SysRunStaDef bp_run_sta = 3;
  }
  oneof _bp_vol {
    float bp_vol = 4;
  }
  oneof _bp_amp {
    float bp_amp = 5;
  }
  oneof _bp_mod_sta {
    .BpModelStaDef bp_mod_sta = 6;
  }
  oneof _bp_remain_watth {
    float bp_remain_watth = 7;
  }
  oneof _bp_chg_dsg_stat {
    uint32 bp_chg_dsg_stat = 8;
  }
  oneof _bp_bus_vol {
    float bp_bus_vol = 9;
  }
  oneof _bp_bus_amp {
    float bp_bus_amp = 10;
  }
  oneof _bp_spin_switch {
    bool bp_spin_switch = 12;
  }
  oneof _bp_timestamp {
    uint32 bp_timestamp = 13;
  }
  oneof _bp_down_limit_soc {
    float bp_down_limit_soc = 14;
  }
  oneof _bp_up_limit_soc {
    float bp_up_limit_soc = 15;
  }
  oneof _bp_bus_vol_filter {
    float bp_bus_vol_filter = 16;
  }
  oneof _bp_ac_recharge_flag {
    bool bp_ac_recharge_flag = 17;
  }
  oneof _bp_active_cal_req_stat {
    uint32 bp_active_cal_req_stat = 18;
  }
  oneof _bp_active_cal_run_stat {
    uint32 bp_active_cal_run_stat = 19;
  }
