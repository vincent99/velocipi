syntax = "proto3";

message CfgNetDeviceList {
  oneof _share_cfg_net_info {
    string device_sn = 1;
    .ShareCfgNetInfo share_cfg_net_info = 2;
  }
}

message CommonAck {
  optional uint32 result = 1;
}

message ShareCfgNetInfo {
  optional string wifi_ssid = 1;
  optional string wifi_password = 2;
  optional string https_url = 3;
}

