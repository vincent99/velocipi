syntax = "proto3";

message EdevBaseInfo {
  oneof _dev_sn {
    uint32 dev_addr = 1;
    string dev_sn = 2;
  }
  oneof _sub_addr {
    uint32 sub_addr = 3;
  }
}

message EDevGet {
  optional uint32 dev_addr = 1;
}

message EDevGetItem {
  optional .EdevBaseInfo dev_info = 1;
}

message EDevGetAck {
  repeated .EDevGetItem dev_list = 1;
  optional uint32 local_connected = 2;
}

message EDevBind {
  oneof _commute_type {
    .EdevBaseInfo dev_info = 1;
    bool bind_flg = 2;
    uint32 commute_type = 3;
  }
  oneof _trig_role {
    uint32 trig_role = 4;
  }
}

message EDevBindAck {
  optional .EdevBaseInfo dev_info = 1;
  optional bool bind_flg = 2;
  optional int32 result = 3;
  optional uint32 commute_type = 4;
  optional uint32 target_topology_lev = 5;
}

message EDevBindItem {
  oneof _dev_prio {
    .EdevBaseInfo dev_info = 1;
    uint32 commute_type = 2;
    uint32 online_bits = 3;
    uint32 dev_prio = 4;
    uint32 topology_lev = 5;
    bool is_center_node = 8;
  }
  oneof _is_pcs_master {
    bool is_pcs_master = 6;
  }
  oneof _is_energy_master {
    bool is_energy_master = 7;
  }
}

message DevListReport {
  optional uint32 dev_addr = 1;
  repeated .EDevBindItem dev_type_child = 2;
  optional .EDevBindItem dev_host = 3;
}

message SingleCenterItem {
  optional string parent_sn = 1;
  optional .EDevBindItem dev_center = 2;
  optional uint32 child_node_num = 3;
}

message CenterList {
  repeated .SingleCenterItem dev_center = 3;
}

message EDevBindListGet {
  optional .EdevBaseInfo dev_info = 1;
  optional uint32 operation_type = 2;
}

message energy_lev_set {
  oneof _dev_info {
    .EdevBaseInfo dev_info = 1;
    uint32 target_lev = 2;
    string parnet_sn = 3;
    uint32 parnet_link = 4;
    uint32 trig_role = 5;
  }
}

message EDevEnergyRemoteListSync {
  optional uint32 dev_addr = 1;
}

message EDevEnergyRemoteListSyncAck {
  optional uint32 dev_addr = 1;
  repeated .EdevBaseInfo dev_list = 2;
}

message EDevPriorityItem {
  oneof _prio_type {
    .EdevBaseInfo dev_info = 1;
    uint32 dev_prio = 2;
    bool enable = 3;
    uint32 prio_type = 4;
    bytes data = 6;
  }
  oneof _type {
    uint32 type = 5;
  }
}

message EDevPriorityListSet {
  repeated .EDevPriorityItem dev_prio_set = 1;
}

message EDevPriorityListSetAck {
  optional int32 result = 1;
}

message EDevPriorityListReport {
  repeated .EDevPriorityItem dev_prio_report = 1;
}

message EDevPriorityListReportGet {
}

message EDevRunDataGet {
  optional .EdevBaseInfo dev_info = 1;
}

message EDevRunData {
  optional .EdevBaseInfo dev_info = 1;
  optional bytes data = 2;
}

message EDevOnOffSet {
  optional .EdevBaseInfo dev_info = 1;
  optional uint32 on_off_set = 2;
}

message EDevOnOffSetAck {
  optional .EdevBaseInfo dev_info = 1;
  optional uint32 result = 2;
}

message EDevRemotCtrlSet {
  optional .EdevBaseInfo dev_info = 1;
  optional bytes data = 2;
}

message EDevRemotCtrlSetAck {
  optional .EdevBaseInfo dev_info = 1;
  optional uint32 result = 2;
}

message EDevModeSet {
  optional .EdevBaseInfo dev_info = 1;
  optional uint32 mode = 2;
}

message EDevModeSetAck {
  optional .EdevBaseInfo dev_info = 1;
  optional uint32 result = 2;
}

message EDevParamSet {
  optional .EdevBaseInfo dev_info = 1;
  optional bytes data = 2;
}

message EDevParamSetAck {
  optional .EdevBaseInfo dev_info = 1;
  optional uint32 result = 2;
}

message EDevParamReport {
  optional .EdevBaseInfo dev_info = 1;
  optional bytes data = 2;
}

message RTUPointItem {
  oneof _u_value {
    uint32 address = 1;
    int32 u_value = 2;
  }
  oneof _value_type {
    uint32 value_type = 3;
  }
}

message EdevPointParamSet {
  optional .EdevBaseInfo dev_info = 1;
  repeated .RTUPointItem rtu_pt = 2;
}

message EdevPointParamSetAck {
  optional .EdevBaseInfo dev_info = 1;
  optional int32 result = 2;
  repeated .RTUPointItem rtu_pt = 3;
}

message EdevPointParamGet {
  optional .EdevBaseInfo dev_info = 1;
  repeated .RTUPointItem rtu_pt = 2;
}

message EdevPointParamGetAck {
  optional .EdevBaseInfo dev_info = 1;
  repeated .RTUPointItem rtu_pt = 2;
}

message EDevToRemoteHeartBeat {
  optional .EdevBaseInfo dev_info = 1;
  optional bytes data = 2;
}

message EDevFromRemoteHeartBeat {
  optional .EdevBaseInfo dev_info = 1;
  optional bytes data = 2;
}

message TimeTaskParamDetail {
  optional .TIME_TASK_DETAIL_TYPE type = 1;
  optional float val = 2;
}

message EDevTimerTaskCfg {
  optional uint32 task_index = 1;
  optional bool is_cfg = 2;
  optional bool is_enable = 3;
  optional uint32 conflict_flag = 4;
  optional .TIME_TASK_MODE time_mode = 5;
  optional uint32 time_param = 6;
  optional uint32 time_table = 7;
  optional .TIME_TASK_TYPE task_type = 8;
  optional uint32 task_param = 9;
  repeated .TimeTaskParamDetail task_param_detail = 10;
}

message EDevTimerTaskCfgSet {
  optional .EdevBaseInfo dev_info = 1;
  optional .EDevTimerTaskCfg timer_task = 2;
}

message EDevTimerTaskCfgSetAck {
  optional .EdevBaseInfo dev_info = 1;
  optional uint32 type = 2;
  optional uint32 task_index = 3;
  optional int32 result = 4;
}

message EDevTimerTaskGet {
  optional .EdevBaseInfo dev_info = 1;
}

message EDevTimerTaskReport {
  oneof _curr_task {
    .EdevBaseInfo dev_info = 1;
    .EDevTimerTaskCfg time_task_cfg = 2;
    .EDevTimerTaskCfg curr_task = 3;
  }
}

message EDevEnergyStreamShowItem {
  optional .EdevBaseInfo dev_info = 1;
  optional float pwr = 2;
  optional float from_pv = 4;
  optional float from_bat = 5;
  optional float from_grid = 6;
}

message EDevEnergyStreamShow {
  repeated .EDevEnergyStreamShowItem energy = 1;
}

message EDevEnergyStreamHistoryItem {
  optional .EdevBaseInfo dev_info = 1;
  optional fixed32 timestamp = 2;
  optional float pwr = 3;
  repeated float param = 4;
}

message EDevEnergyStreamHistory {
  optional uint32 seq = 1;
  repeated .EDevEnergyStreamHistoryItem energy_history = 2;
}

message EDevEnergyStreamHistoryAck {
  oneof _state {
    uint32 seq = 1;
    uint32 energy_num = 2;
    uint32 state = 3;
  }
}

message EDevEnergyItem {
  optional fixed32 timestamp = 1;
  optional uint32 watth_type = 2;
  repeated uint32 watth = 3;
}

message EDevEnergyTotalReport {
  optional .EdevBaseInfo dev_info = 1;
  optional uint32 watth_seq = 2;
  optional .EDevEnergyItem watth_item = 3;
}

message EDevEnergyTotalReportAck {
  optional .EdevBaseInfo dev_info = 1;
  optional int32 result = 2;
  optional uint32 watth_seq = 3;
  optional uint32 watth_type = 4;
}

message EDevExpendCtrl {
  optional .EdevBaseInfo dev_info = 1;
  optional uint32 expend_cmd = 2;
  optional bytes data = 3;
}

message EDevExpendCtrlAck {
  optional .EdevBaseInfo dev_info = 1;
  optional uint32 expend_cmd = 2;
  optional int32 result = 3;
  optional bytes data = 4;
}

message EDevBatchItem {
  optional .EdevBaseInfo dev_info = 1;
  optional bytes data = 2;
}

message EDevBatchItemAck {
  optional .EdevBaseInfo dev_info = 1;
  optional int32 result = 2;
  optional bytes data = 3;
}

message EDevBatchBindAck {
  optional uint32 remain_num = 1;
}

message EDevBatchOP {
  repeated .EDevBatchItem item_info = 1;
  optional uint32 cmd_id = 2;
}

message EDevBatchOPAck {
  repeated .EDevBatchItemAck item_ack_info = 1;
  optional int32 result = 2;
  optional int32 progress = 3;
  optional uint32 cmd_id = 4;
  optional bytes data = 5;
}

message EdevCmdSetReply {
  oneof _bind_ack {
    uint32 cmd_id = 1;
    uint32 res = 2;
    .EDevBindAck bind_ack = 3;
  }
  oneof _priority_set_ack {
    .EDevPriorityListSetAck priority_set_ack = 4;
  }
  oneof _on_off_set_ack {
    .EDevOnOffSetAck on_off_set_ack = 5;
  }
  oneof _remote_ctr_set_ack {
    .EDevRemotCtrlSetAck remote_ctr_set_ack = 6;
  }
  oneof _mode_set_ack {
    .EDevModeSetAck mode_set_ack = 7;
  }
  oneof _param_set_ack {
    .EDevParamSetAck param_set_ack = 8;
  }
  oneof _point_param_set_ack {
    .EdevPointParamSetAck point_param_set_ack = 9;
  }
  oneof _point_param_get_ack {
    .EdevPointParamGetAck point_param_get_ack = 10;
  }
  oneof _timer_task_set_ack {
    .EDevTimerTaskCfgSetAck timer_task_set_ack = 11;
  }
  oneof _expend_ctr_ack {
    .EDevExpendCtrlAck expend_ctr_ack = 12;
  }
  oneof _batch_operation_ack {
    .EDevBatchOPAck batch_operation_ack = 13;
  }
  oneof _get_ack {
    .EDevGetAck get_ack = 14;
  }
}

