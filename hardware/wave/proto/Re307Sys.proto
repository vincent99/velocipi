message EmsTimerTaskCfg {
  oneof _is_effect {
    uint32 role = 1;
    uint32 is_cfg = 2;
    uint32 task_index = 3;
    bool is_enable = 4;
    bool is_effect = 5;
    uint32 time_table = 10;
  }
  oneof _type {
    uint32 type = 6;
  }
  oneof _sys_chg_dsg_pwr {
    uint32 sys_chg_dsg_pwr = 7;
  }
  oneof _time_mode {
    uint32 time_mode = 8;
  }
  oneof _time_param {
    uint32 time_param = 9;
  }
}

message EmsAllTimerTaskReport {
  repeated .EmsTimerTaskCfg time_task_cfg = 1;
}

message EmsPeakShavingReport {
  oneof _peak_shaving_status {
    .PeakShavingStatus peak_shaving_status = 1;
  }
  oneof _peak_shaving_max_power {
    float peak_shaving_max_power = 2;
  }
  oneof _peak_shaving_energy {
    float peak_shaving_energy = 3;
  }
  oneof _peak_shaving_soc {
    float peak_shaving_soc = 4;
  }
  oneof _peak_shaving_times {
    float peak_shaving_times = 5;
  }
  oneof _peak_shaving_control_energy {
    float peak_shaving_control_energy = 6;
  }
}

message EmsAllPeakTaskReport {
  repeated .EmsPeakTaskCfg peak_task_cfg = 1;
}

message PeaktaskInfo {
  optional uint32 peak_pwr_max = 1;
  optional uint32 peak_energy_max = 2;
  optional uint32 peak_soc = 3;
}

message EmsPeakTaskCfg {
  oneof _is_effect {
    uint32 role = 1;
    uint32 is_cfg = 2;
    uint32 task_index = 3;
    bool is_enable = 4;
    bool is_effect = 5;
    uint32 type = 6;
    bytes peak_sub_info = 8;
  }
  oneof _Info {
    .PeaktaskInfo Info = 7;
  }
}

enum WorkMode {
  WORKMODE_SELFUSE = 0;
  WORKMODE_TOU = 1;
  WORKMODE_BACKUP = 2;
  WORKMODE_DBG = 3;
  WORKMODE_AC_MAKEUP = 4;
  WORKMODE_DRM_MODE = 5;
  WORKMODE_REMOTE_SCHED = 6;
  WORKMODE_STANDBY_MODE = 7;
  WORKMODE_SOC_CALIB = 8;
  WORKMODE_TIMER_MODE = 9;
}

enum SgReadyMode {
  SG_AUTO = 0;
  SG_MANUAL = 1;
}

enum RunStaDef {
  RUNSTA_STANDBY = 0;
  RUNSTA_RUN = 1;
  RUNSTA_STOP = 2;
}

enum PeakShavingStatus {
  NO_PEAK_SHAVING_TASK = 0;
  PEAK_SHAVING_TASK_EXIST = 1;
  PEAK_SHAVING_TASK_ACTIVE = 2;
}

