message ems_heartbeat_pack_v1p0_t {
  oneof _chg_state {
    uint32 chg_state = 1;
    uint32 bms_is_connt = 16;
  }
  oneof _chg_cmd {
    uint32 chg_cmd = 2;
  }
  oneof _dsg_cmd {
    uint32 dsg_cmd = 3;
  }
  oneof _chg_vol {
    uint32 chg_vol = 4;
  }
  oneof _chg_amp {
    uint32 chg_amp = 5;
  }
  oneof _fan_level {
    uint32 fan_level = 6;
  }
  oneof _max_charge_soc {
    uint32 max_charge_soc = 7;
  }
  oneof _bms_model {
    uint32 bms_model = 8;
  }
  oneof _lcd_show_soc {
    uint32 lcd_show_soc = 9;
  }
  oneof _open_ups_flag {
    uint32 open_ups_flag = 10;
  }
  oneof _bms_warning_state {
    uint32 bms_warning_state = 11;
  }
  oneof _chg_remain_time {
    uint32 chg_remain_time = 12;
  }
  oneof _dsg_remain_time {
    uint32 dsg_remain_time = 13;
  }
  oneof _ems_is_normal_flag {
    uint32 ems_is_normal_flag = 14;
  }
  oneof _f32_lcd_show_soc {
    float f32_lcd_show_soc = 15;
  }
  oneof _max_available_num {
    uint32 max_available_num = 17;
  }
  oneof _open_bms_idx {
    uint32 open_bms_idx = 18;
  }
  oneof _para_vol_min {
    uint32 para_vol_min = 19;
  }
  oneof _para_vol_max {
    uint32 para_vol_max = 20;
  }
  oneof _min_dsg_soc {
    uint32 min_dsg_soc = 21;
  }
  oneof _min_open_oil_eb_soc {
    uint32 min_open_oil_eb_soc = 22;
  }
  oneof _max_close_oil_eb_soc {
    uint32 max_close_oil_eb_soc = 23;
  }
}

message ems_heartbeat_pack_v1p3_t {
  oneof _chg_disable_cond {
    uint32 chg_disable_cond = 1;
  }
  oneof _dsg_disable_cond {
    uint32 dsg_disable_cond = 2;
  }
  oneof _chg_line_plug_in_flag {
    uint32 chg_line_plug_in_flag = 3;
  }
  oneof _sys_chg_dsg_state {
    uint32 sys_chg_dsg_state = 4;
  }
  oneof _ems_heartbeat_ver {
    uint32 ems_heartbeat_ver = 5;
  }
}

message CMSHeartBeatReport {
  optional .ems_heartbeat_pack_v1p0_t v1p0 = 1;
  optional .ems_heartbeat_pack_v1p3_t v1p3 = 2;
}

message AppRuquestBpEuLawData {
  oneof _app_to_bms_launch_date {
    string pack_sn = 1;
    uint32 app_to_bms_launch_date = 2;
  }
  oneof _app_launch_date_set_type {
    uint32 app_launch_date_set_type = 3;
  }
  oneof _app_to_bms_reset_flag {
    uint32 app_to_bms_reset_flag = 4;
  }
  oneof _bms_data_upload_en {
    uint32 bms_data_upload_en = 5;
  }
}

message AppRuquestBpEuLawDataAck {
  oneof _soh {
    string bms_sn = 1;
    uint32 soh = 2;
  }
  oneof _accu_chg_cap {
    uint32 accu_chg_cap = 3;
  }
  oneof _accu_dsg_cap {
    uint32 accu_dsg_cap = 4;
  }
  oneof _accu_chg_energy {
    uint32 accu_chg_energy = 5;
  }
  oneof _accu_dsg_energy {
    uint32 accu_dsg_energy = 6;
  }
  oneof _deep_dsg_cnt {
    uint32 deep_dsg_cnt = 7;
  }
  oneof _high_temp_use_time {
    uint32 high_temp_use_time = 8;
  }
  oneof _low_temp_use_time {
    uint32 low_temp_use_time = 9;
  }
  oneof _high_temp_chg_time {
    uint32 high_temp_chg_time = 10;
  }
  oneof _low_temp_chg_time {
    uint32 low_temp_chg_time = 11;
  }
  oneof _bp_launch_date {
    uint32 bp_launch_date = 12;
  }
  oneof _bp_cycles {
    uint32 bp_cycles = 13;
  }
  oneof _bp_power_capability {
    float bp_power_capability = 14;
  }
  oneof _bp_round_trip_eff {
    float bp_round_trip_eff = 15;
  }
  oneof _bp_self_dsg_rate {
    float bp_self_dsg_rate = 16;
  }
  oneof _bp_ohm_res {
    float bp_ohm_res = 17;
  }
  oneof _bp_reset_flag {
    .BpResetType bp_reset_flag = 18;
  }
  oneof _bp_launch_date_flag {
    .AppDateType bp_launch_date_flag = 19;
  }
  oneof _num {
    uint32 num = 20;
  }
}

enum AppDateType {
  NONE_SET = 0;
  APP_AUTO_SET = 1;
  APP_MANUAL_SET = 2;
  BMS_AUTO_SET = 3;
}

enum BpResetType {
  NONE_RESET_VAL = 0;
  HAS_RESET_VAL = 1;
  NEED_RESET_VAL = 2;
  MASTER_RESET = 3;
}

