  }
  oneof _cell_id {
    uint32 cell_id = 3;
  }
  oneof _err_code {
    uint32 err_code = 4;
  }
  oneof _sys_ver {
    uint32 sys_ver = 5;
  }
  oneof _soc {
    uint32 soc = 6;
  }
  oneof _vol {
