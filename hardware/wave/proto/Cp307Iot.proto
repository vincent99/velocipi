  }
  oneof _feedback_byte {
    uint32 feedback_byte = 4;
  }
  oneof _meter {
    .MeterValueItem meter = 7;
  }
  oneof _mid_meter {
    .MeterValueItem mid_meter = 8;
  }
  oneof _energy_value {
    uint32 energy_value = 9;
  }
  oneof _current_work_mode {
    uint32 current_work_mode = 16;
  }
  oneof _charge_current_set {
    uint32 charge_current_set = 17;
  }
