  oneof _cp_pwm_catch_duty {
    uint32 cp_pwm_catch_duty = 26;
  }
  oneof _obc_type {
    uint32 obc_type = 27;
  }
  oneof _charge_power {
    float charge_power = 28;
  }
  oneof _start_time {
    uint32 start_time = 40;
  }
  oneof _charge_time {
    uint32 charge_time = 41;
  }
  oneof _charge_energy {
    uint32 charge_energy = 42;
