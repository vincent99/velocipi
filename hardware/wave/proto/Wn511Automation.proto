syntax = "proto3";

message timetask_ack_message {
  optional uint32 ack = 1;
}

message time_rtc_data {
  oneof _week {
    int32 week = 1;
  }
  oneof _sec {
    int32 sec = 2;
  }
  oneof _min {
    int32 min = 3;
  }
  oneof _hour {
    int32 hour = 4;
  }
  oneof _day {
    int32 day = 5;
  }
  oneof _month {
    int32 month = 6;
  }
  oneof _year {
    int32 year = 7;
  }
}

message time_range_strategy {
  optional uint32 is_config = 1;
  optional uint32 is_enable = 2;
  optional uint32 time_mode = 3;
  optional uint32 time_data = 4;
  optional .time_rtc_data start_time = 5;
  optional .time_rtc_data stop_time = 6;
}

message timetask_set_message {
  oneof _dst_time {
    uint32 task_index = 1;
    .time_range_strategy time_range = 2;
    uint32 type = 3;
    int32 dst_time = 4;
  }
}

message timetask_del_message {
  optional uint32 task_index = 1;
}

message timetask_read_message {
  oneof _task1 {
    .timetask_set_message task1 = 1;
  }
  oneof _task2 {
    .timetask_set_message task2 = 2;
  }
  oneof _task3 {
    .timetask_set_message task3 = 3;
  }
  oneof _task4 {
    .timetask_set_message task4 = 4;
  }
  oneof _task5 {
    .timetask_set_message task5 = 5;
  }
  oneof _task6 {
    .timetask_set_message task6 = 6;
  }
  oneof _task7 {
    .timetask_set_message task7 = 7;
  }
  oneof _task8 {
    .timetask_set_message task8 = 8;
  }
  oneof _task9 {
    .timetask_set_message task9 = 9;
  }
  oneof _task10 {
    .timetask_set_message task10 = 10;
  }
  oneof _task11 {
    .timetask_set_message task11 = 11;
  }
}

message timetask_read_one_message {
  optional .timetask_set_message task = 1;
}

message timetask_read_ack_message {
  optional uint32 task_info = 1;
}

message energy_push_pack_ack {
  optional uint32 result = 1;
  optional uint32 watth_seq = 2;
  optional uint32 watth_type = 3;
}

message comm_energy_pack {
  optional uint32 timestamp = 1;
  optional uint32 watth_type = 2;
  repeated uint32 watth = 3;
}

message comm_energy_total_pack {
  optional uint32 watth_seq = 1;
  repeated .comm_energy_pack comm_energy = 2;
}

message comm_power_pack_ack {
  optional uint32 sys_seq = 1;
}

message heartbeat_frequency {
  optional uint32 frequency = 1;
}

message message_response {
  optional uint32 ack = 1;
}

message country_town_message {
  optional uint32 country = 1;
  optional uint32 town = 2;
}

message heartbeat_type2_frequency {
  optional uint32 time_interval = 1;
}

message utc_time_get_ack {
  optional uint32 utc_time = 1;
  optional int32 time_zone = 2;
  optional int32 dst_time = 3;
}

message set_all_timetask_dst {
  optional int32 dst_time = 1;
}

