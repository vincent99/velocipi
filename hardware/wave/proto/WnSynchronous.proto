syntax = "proto3";

message ap_message {
  optional string router_ssid = 1;
  optional bytes router_bssid = 2;
  optional int32 router_rssi = 3;
  optional uint32 router_channel = 4;
}

message ap_list_message {
  repeated .ap_message ap_list = 1;
}

message network_message {
  oneof _mesh_type {
    uint32 mesh_type = 1;
    bytes mesh_id = 5;
  }
  oneof _router_ssid {
    string router_ssid = 2;
  }
  oneof _router_pwd {
    string router_pwd = 3;
  }
  oneof _router_bssid {
    bytes router_bssid = 4;
  }
  oneof _https_url {
    string https_url = 6;
  }
  oneof _router_channel {
    uint32 router_channel = 7;
  }
  oneof _mesh_enable {
    uint32 mesh_enable = 8;
  }
  oneof _softap_pwd {
    string softap_pwd = 9;
  }
}

message network_sta_message {
  oneof _mesh_state {
    int32 mesh_state = 1;
  }
  oneof _mesh_layer {
    int32 mesh_layer = 2;
  }
  oneof _parent_rssi {
    int32 parent_rssi = 3;
  }
  oneof _https_state {
    int32 https_state = 4;
  }
  oneof _mqtt_state {
    int32 mqtt_state = 5;
  }
  oneof _ping_info {
    bytes ping_info = 6;
  }
}

message sn_pack {
  optional string sn = 1;
}

message ota_cmd_message {
  oneof _force {
    uint32 size = 1;
    string md5 = 2;
    uint32 version = 3;
    string url = 4;
    .sn_pack sn_list = 6;
    bool force = 7;
  }
}

message ack_message {
  optional bool ret_sta = 1;
}

